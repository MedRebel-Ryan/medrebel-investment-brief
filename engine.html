<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<title>MedRebel · The Data Engine, 3D</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;overflow:hidden}

  #mr-hub-3d{position:relative;width:100%;height:100vh;min-height:560px;
    user-select:none;-webkit-user-select:none;touch-action:pan-y;
    background:radial-gradient(1200px 760px at 50% 42%, #182646 0%, #0d1730 58%, #0a1126 100%)}
  #mr-hub-3d canvas{display:block;cursor:grab}
  #mr-hub-3d canvas.dragging{cursor:grabbing}
  #mr-hub-3d canvas.hovering{cursor:pointer}

  .mr-vignette{position:absolute;inset:0;pointer-events:none;
    background:radial-gradient(ellipse at center, transparent 55%, rgba(5,9,20,0.45) 100%)}

  .mr-head{position:absolute;top:36px;left:0;right:0;text-align:center;pointer-events:none;z-index:5;transition:opacity .45s ease}
  .mr-head.mr-faded,.mr-hint.mr-faded{opacity:0}
  .mr-eyebrow{display:inline-block;font-size:12px;font-weight:700;letter-spacing:0.32em;
    color:#33CCFF;text-transform:uppercase}
  .mr-title{margin-top:10px;font-family:'Outfit','Inter',-apple-system,sans-serif;font-size:clamp(26px,3.6vw,46px);font-weight:300;
    letter-spacing:0.06em;color:#f1f5f9}
  .mr-title .lite{color:#33CCFF}
  .mr-subtitle{margin-top:9px;font-family:'Outfit','Inter',-apple-system,sans-serif;font-size:clamp(14px,1.6vw,19px);font-weight:400;letter-spacing:0.24em;color:#eef3f9}
  .mr-subtitle .lite{color:#33CCFF}
  .mr-chips{margin-top:14px;display:flex;gap:10px;justify-content:center}
  .mr-chip{font-size:11.5px;font-weight:600;letter-spacing:0.06em;padding:6px 14px;border-radius:999px;
    color:#bfe9ff;border:1px solid rgba(51,204,255,0.35);background:rgba(51,204,255,0.08)}

  .mr-hint{transition:opacity .45s ease;position:absolute;bottom:24px;left:0;right:0;text-align:center;pointer-events:none;z-index:5;
    font-size:12.5px;letter-spacing:0.04em;color:#8fa3bf;animation:mrHint 3.2s ease-in-out infinite}
  @keyframes mrHint{0%,100%{opacity:0.55}50%{opacity:1}}

  .mr-btns{position:absolute;top:30px;right:30px;z-index:6;display:flex;gap:10px}
  .mr-btn{font-size:11.5px;font-weight:600;letter-spacing:0.08em;cursor:pointer;
    padding:8px 16px;border-radius:999px;transition:all .2s;
    color:#bfe9ff;border:1px solid rgba(51,204,255,0.3);background:rgba(10,18,38,0.6)}
  .mr-btn:hover{background:rgba(51,204,255,0.15)}

  .mr-loader{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    z-index:9;transition:opacity .8s;flex-direction:column;gap:18px;background:#0a1126}
  .mr-loader.done{opacity:0;pointer-events:none}
  .mr-pulse{width:46px;height:46px;border-radius:50%;
    background:radial-gradient(circle, #33CCFF, #005FFF);
    animation:mrBeat 1.05s ease-in-out infinite}
  .mr-loader span{font-size:12px;letter-spacing:0.28em;text-transform:uppercase;color:#8fa3bf}
  @keyframes mrBeat{0%,100%{transform:scale(1)}12%{transform:scale(1.22)}24%{transform:scale(1.04)}36%{transform:scale(1.14)}50%{transform:scale(1)}}

  @media (max-width:700px){
    .mr-head{top:22px}
    .mr-btns{top:18px;right:14px}
  }
</style>
</head>
<body>

<section id="mr-hub-3d">
  <div class="mr-loader" id="mrLoader"><div class="mr-pulse"></div><span>Data into Direction</span></div>
  <div class="mr-vignette"></div>
  <div class="mr-head">
    <div class="mr-eyebrow">Product Architecture</div>
    <div class="mr-title">The Med<span class="lite">Rebel</span> Data Engine</div>
    <div class="mr-subtitle">WE TURN <span class="lite">DATA</span> INTO DIRECTION</div>
    <div class="mr-chips"><span class="mr-chip">Open Dental · Live</span><span class="mr-chip">SOC 2 Type II Infra</span></div>
  </div>
  <div class="mr-btns">
    <button class="mr-btn" id="mrReset">RESET VIEW</button>
  </div>
  <div class="mr-hint">Data flows left to right &middot; Pinch or drag to explore</div>
</section>

/* ---------- renderer / scene / camera ---------- */
const renderer = new THREE.WebGLRenderer({antialias: true, alpha: true});
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(section.clientWidth, section.clientHeight);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.05;
section.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x0d1730, 0.0075);
const orbitGroup = new THREE.Group();
scene.add(orbitGroup);

const camera = new THREE.PerspectiveCamera(45, section.clientWidth / section.clientHeight, 0.1, 200);

const pmrem = new THREE.PMREMGenerator(renderer);
scene.environment = pmrem.fromScene(new RoomEnvironment(), 0.04).texture;

/* ---------- lights ---------- */
scene.add(new THREE.AmbientLight(0xbcd4ff, 0.38));
const key = new THREE.DirectionalLight(0xffffff, 1.15);
key.position.set(6, 10, 8);
scene.add(key);
const fill = new THREE.DirectionalLight(0xdfeaff, 0.45);
fill.position.set(-7, -3, -9);
scene.add(fill);
const heartLight = new THREE.PointLight(0x33CCFF, 1.5, 30, 1.6);
scene.add(heartLight);

/* ---------- orbit: THREE.js OrbitControls (robust mobile touch + pinch zoom) ---------- */
const cv = renderer.domElement;
const START_RADIUS = isMobile ? 56 : 42;
const START_PHI = 1.25;
camera.position.set(0, START_RADIUS * Math.cos(START_PHI), START_RADIUS * Math.sin(START_PHI));
camera.lookAt(0, 0.6, 0);

const controls = new OrbitControls(camera, cv);
controls.target.set(0, 0.6, 0);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.rotateSpeed = 0.9;
controls.zoomSpeed = 0.9;
controls.enablePan = false;
controls.minDistance = 16;
controls.maxDistance = 64;
controls.minPolarAngle = 0.12;   // near top-down
controls.maxPolarAngle = 1.92;   // slightly below the equator
controls.touches = { ONE: THREE.TOUCH.ROTATE, TWO: THREE.TOUCH.DOLLY_PAN };
controls.update();
controls.saveState();

let interacting = false, lastEnd = -10;
controls.addEventListener('start', () => { interacting = true; });
controls.addEventListener('end', () => { interacting = false; lastEnd = clock.elapsedTime; });

document.getElementById('mrReset').addEventListener('click', () => controls.reset());

/* ---------- glow texture ---------- */
function glowTexture(inner, outer){
  const c = document.createElement('canvas'); c.width = c.height = 256;
  const g = c.getContext('2d');
  const grad = g.createRadialGradient(128, 128, 0, 128, 128, 128);
  grad.addColorStop(0, inner); grad.addColorStop(0.35, outer); grad.addColorStop(1, 'rgba(0,0,0,0)');
  g.fillStyle = grad; g.fillRect(0, 0, 256, 256);
  const tx = new THREE.CanvasTexture(c); tx.colorSpace = THREE.SRGBColorSpace;
  return tx;
}
const softGlowTex = glowTexture('rgba(190,235,255,0.9)', 'rgba(51,150,255,0.32)');

/* ---------- the MedRebel heart mark ----------
   Exact visible facet regions of the brand mark (80 x 65 SVG space),
   boolean-decomposed from the original overlapping paths so the front
   view matches the 2D logo precisely. Non-overlapping mosaic pieces. */
const FACETS = [
  {color: '#008CFF', depth: 16, poly: [[60,0],[60,26],[80,39],[80,13]]},
  {color: '#005FFF', depth: 18, poly: [[0,13],[20,26],[40,13],[20,0]]},
  {color: '#33CCFF', depth: 16, poly: [[40,65],[80,39],[60,26],[20,52]]},
  {color: '#F4F8FF', depth: 22, poly: [[20,26],[0,13],[0,39],[20,52],[60,26],[60,0]]}
];

const heartGroup = new THREE.Group();
scene.add(heartGroup);
const markGroup = new THREE.Group();
const MARK_SCALE = 0.092;
markGroup.scale.setScalar(MARK_SCALE);
heartGroup.add(markGroup);

const heartMaterials = [];
FACETS.forEach(f => {
  const shape = new THREE.Shape();
  f.poly.forEach(([px, py], j) => {
    const x = px - 40, y = (65 - py) - 32.5;
    if(j === 0) shape.moveTo(x, y); else shape.lineTo(x, y);
  });
  shape.closePath();
  const geo = new THREE.ExtrudeGeometry(shape, {
    depth: f.depth, bevelEnabled: true,
    bevelThickness: 1.1, bevelSize: 0.8, bevelSegments: 2, steps: 1
  });
  geo.translate(0, 0, -f.depth / 2);
  geo.computeVertexNormals();
  const col = new THREE.Color(f.color);
  const mat = new THREE.MeshPhysicalMaterial({
    color: col, flatShading: true,
    metalness: 0.22, roughness: 0.22, clearcoat: 0.75, clearcoatRoughness: 0.25,
    emissive: col.clone().multiplyScalar(0.2), emissiveIntensity: 0.12,
    envMapIntensity: 1.2
  });
  const mesh = new THREE.Mesh(geo, mat);
  markGroup.add(mesh);
  heartMaterials.push(mat);
});

(function buildWordmark(){
  const loader = new SVGLoader();
  const matWhite = new THREE.MeshPhysicalMaterial({
    color: 0xf4f8ff, metalness: 0.25, roughness: 0.28, clearcoat: 0.6,
    emissive: 0x222a3a, emissiveIntensity: 0.15, envMapIntensity: 1.1
  });
  const matCyan = new THREE.MeshPhysicalMaterial({
    color: 0x33CCFF, metalness: 0.25, roughness: 0.25, clearcoat: 0.6,
    emissive: 0x0a4a66, emissiveIntensity: 0.3, envMapIntensity: 1.1
  });
  heartMaterials.push(matCyan);
  function addPaths(dList, mat){
    dList.forEach(d => {
      const svg = '<svg xmlns="http://www.w3.org/2000/svg"><path d="' + d + '"/></svg>';
      loader.parse(svg).paths.forEach(p => {
        SVGLoader.createShapes(p).forEach(shape => {
          const geo = new THREE.ExtrudeGeometry(shape, {
            depth: 10, bevelEnabled: true, bevelThickness: 0.7, bevelSize: 0.5,
            bevelSegments: 1, curveSegments: 8, steps: 1
          });
          geo.translate(0, 0, -5);
          wordInner.add(new THREE.Mesh(geo, mat));
        });
      });
    });
  }
  addPaths(WORD_WHITE, matWhite);
  addPaths(WORD_CYAN, matCyan);
  const box = new THREE.Box3().setFromObject(wordInner);
  const center = box.getCenter(new THREE.Vector3());
  wordInner.position.sub(center);
  wordGroup.rotation.x = Math.PI;
  const width = box.getSize(new THREE.Vector3()).x;
  const s = 7.4 / width;
  wordGroup.scale.setScalar(s);
  wordGroup.position.y = -4.25;
})();

function gauss(x, c, w){ const d = x - c; return Math.exp(-(d * d) / (2 * w * w)); }
function beatValue(phase){ return gauss(phase, 0.03, 0.045) + 0.55 * gauss(phase, 0.19, 0.055); }

/* ---------- canvas helpers ---------- */
function roundRect(g, x, y, w, h, r){
  g.beginPath();
  g.moveTo(x + r, y);
  g.arcTo(x + w, y, x + w, y + h, r);
  g.arcTo(x + w, y + h, x, y + h, r);
  g.arcTo(x, y + h, x, y, r);
  g.arcTo(x, y, x + w, y, r);
  g.closePath();
}
function fitFont(g, text, weight, startPx, minPx, family, maxW){
  let px = startPx;
  while(px > minPx){
    g.font = weight + ' ' + px + 'px ' + family;
    if(g.measureText(text).width <= maxW) break;
    px -= 1;
  }
  return px;
}
const FAM = 'Inter, -apple-system, sans-serif';

function makeTexture(c){
  const tx = new THREE.CanvasTexture(c);
  tx.colorSpace = THREE.SRGBColorSpace;
  tx.anisotropy = renderer.capabilities.getMaxAnisotropy();
  return tx;
}

function cardTexture(item, accent){
  const W = 768, H = 312;
  const c = document.createElement('canvas'); c.width = W; c.height = H;
  const g = c.getContext('2d');
  // frosted COLORED glass panel, tinted to the category group
  roundRect(g, 8, 8, W - 16, H - 16, 42);
  const fg = g.createLinearGradient(0, 8, 0, H - 8);
  fg.addColorStop(0, accent + 'A6');
  fg.addColorStop(1, accent + '7A');
  g.fillStyle = fg; g.fill();
  // white frosted sheen across the top for the glass feel
  g.save();
  roundRect(g, 8, 8, W - 16, H - 16, 42); g.clip();
  const sheen = g.createLinearGradient(0, 8, 0, 150);
  sheen.addColorStop(0, 'rgba(255,255,255,0.38)');
  sheen.addColorStop(1, 'rgba(255,255,255,0)');
  g.fillStyle = sheen; g.fillRect(8, 8, W - 16, 150);
  g.restore();
  // bright category border glow
  roundRect(g, 8, 8, W - 16, H - 16, 42);
  g.lineWidth = 4; g.strokeStyle = accent + 'F2'; g.stroke();
  // choose readable ink from the tint's luminance (dark text on light/silver tints)
  const lightBg = false; // white ink on every card, dark shadow carries contrast
  // category dot
  g.beginPath(); g.arc(72, 90, 16, 0, Math.PI * 2);
  g.fillStyle = lightBg ? 'rgba(18,32,46,0.92)' : 'rgba(255,255,255,0.96)'; g.fill();
  g.beginPath(); g.arc(72, 90, 27, 0, Math.PI * 2);
  g.strokeStyle = lightBg ? 'rgba(18,32,46,0.5)' : 'rgba(255,255,255,0.65)'; g.lineWidth = 3; g.stroke();
  // text with a soft shadow for contrast
  g.shadowColor = lightBg ? 'rgba(255,255,255,0.55)' : 'rgba(6,12,24,0.65)'; g.shadowBlur = lightBg ? 6 : 11; g.shadowOffsetY = 1;
  g.fillStyle = lightBg ? '#10202e' : '#ffffff';
  fitFont(g, item.title, '800', 46, 30, FAM, W - 180);
  g.fillText(item.title, 122, 104);
  g.fillStyle = lightBg ? '#0a1622' : 'rgba(255,255,255,0.94)';
  fitFont(g, item.desc, '700', 32, 24, FAM, W - 110);
  g.fillText(item.desc, 60, 196);
  g.shadowColor = 'transparent'; g.shadowBlur = 0; g.shadowOffsetY = 0;
  if(item.badge){
    g.font = '700 24px ' + FAM;
    const bw = g.measureText(item.badge).width + 44;
    roundRect(g, 60, 224, bw, 50, 25);
    g.fillStyle = lightBg ? 'rgba(18,32,46,0.14)' : 'rgba(255,255,255,0.20)'; g.fill();
    g.strokeStyle = lightBg ? 'rgba(18,32,46,0.5)' : 'rgba(255,255,255,0.65)'; g.lineWidth = 2; g.stroke();
    g.fillStyle = lightBg ? '#10202e' : '#ffffff';
    g.fillText(item.badge, 82, 258);
  }
  return makeTexture(c);
}

function labelTexture(text, accent){
  const W = 1400, H = 110;
  const c = document.createElement('canvas'); c.width = W; c.height = H;
  const g = c.getContext('2d');
  g.fillStyle = accent;
  g.textAlign = 'center';
  const spaced = text.split('').join('  ');
  fitFont(g, spaced, '700', 58, 30, FAM, W - 50);
  g.fillText(spaced, W / 2, 70);
  return {tex: makeTexture(c), aspect: W / H};
}

function chipTexture(text){
  const W = 640, H = 112;
  const c = document.createElement('canvas'); c.width = W; c.height = H;
  const g = c.getContext('2d');
  roundRect(g, 4, 4, W - 8, H - 8, (H - 8) / 2);
  g.fillStyle = 'rgba(51,204,255,0.10)'; g.fill();
  g.lineWidth = 3; g.strokeStyle = 'rgba(51,204,255,0.45)'; g.stroke();
  g.fillStyle = '#cfeeff'; g.textAlign = 'center';
  fitFont(g, text, '600', 38, 24, FAM, W - 90);
  g.fillText(text, W / 2, H / 2 + 13);
  return makeTexture(c);
}

function curveTo(target){
  const dir = target.clone().setY(0).normalize();
  const mid = dir.multiplyScalar(target.length() * 0.45);
  mid.y = target.y * 0.2 + 1.6;
  return new THREE.CubicBezierCurve3(
    new THREE.Vector3(0, 0.6, 0),
    new THREE.Vector3(mid.x * 0.35, 1.4, mid.z * 0.35),
    mid,
    target
  );
}

function addConnection(target, colorHex, reverse){
  const curve = curveTo(target);
  const tube = new THREE.Mesh(
    new THREE.TubeGeometry(curve, 48, 0.028, 6, false),
    new THREE.MeshBasicMaterial({color: colorHex, transparent: true, opacity: 0.16,
      blending: THREE.AdditiveBlending, depthWrite: false})
  );
  orbitGroup.add(tube);
  const pulse = new THREE.Sprite(new THREE.SpriteMaterial({
    map: softGlowTex, color: colorHex, transparent: true, opacity: 0,
    blending: THREE.AdditiveBlending, depthWrite: false
  }));
  pulse.scale.setScalar(0.9);
  orbitGroup.add(pulse);
  const conn = {curve, tube, pulse, t: 2, delay: Math.random() * 0.22, baseOpacity: 0.16, reverse: !!reverse};
  connections.push(conn);
  return conn;
}

function addCard(pos, texture, w, h, conn){
  const sprite = new THREE.Sprite(new THREE.SpriteMaterial({map: texture, transparent: true}));
  sprite.scale.set(w, h, 1);
  sprite.position.copy(pos);
  sprite.userData = {baseScale: new THREE.Vector2(w, h), hover: 0, conn};
  orbitGroup.add(sprite);
  cards.push(sprite);
  if(conn) conn.card = sprite;
  return sprite;
}

/* the live KPI dashboard, framed like a screen */
function kpiPanelTexture(img){
  const W = 1400, H = Math.round(W * img.height / img.width);
  const PAD = 20;
  const c = document.createElement('canvas'); c.width = W + PAD * 2; c.height = H + PAD * 2;
  const g = c.getContext('2d');
  roundRect(g, 4, 4, c.width - 8, c.height - 8, 36);
  g.fillStyle = 'rgba(10,20,40,0.94)'; g.fill();
  g.save();
  roundRect(g, PAD, PAD, W, H, 24); g.clip();
  g.filter = 'saturate(1.18) contrast(1.08) brightness(1.06)';
  g.drawImage(img, PAD, PAD, W, H);
  g.filter = 'none';
  g.restore();
  roundRect(g, 4, 4, c.width - 8, c.height - 8, 36);
  g.lineWidth = 5; g.strokeStyle = 'rgba(51,204,255,0.95)'; g.stroke();
  return makeTexture(c);
}

function badgeTexture(text){
  const W = 620, H = 150;
  const c = document.createElement('canvas'); c.width = W; c.height = H;
  const g = c.getContext('2d');
  roundRect(g, 6, 6, W - 12, H - 12, (H - 12) / 2);
  g.fillStyle = 'rgba(13,24,42,0.55)'; g.fill();
  g.lineWidth = 3; g.strokeStyle = 'rgba(51,204,255,0.5)'; g.stroke();
  g.fillStyle = '#dff3ff'; g.textAlign = 'center'; g.textBaseline = 'middle';
  fitFont(g, text, '600', 44, 28, FAM, W - 80);
  g.fillText(text, W / 2, H / 2 + 2);
  g.textBaseline = 'alphabetic';
  return makeTexture(c);
}

}

const stars = new THREE.Points(starGeo, new THREE.PointsMaterial({

/* ---------- hover raycast ---------- */
const raycaster = new THREE.Raycaster();
const mouseNDC = new THREE.Vector2(-10, -10);
let hovered = null;
cv.addEventListener('mousemove', e => {
  const r = cv.getBoundingClientRect();
  mouseNDC.set(((e.clientX - r.left) / r.width) * 2 - 1, -((e.clientY - r.top) / r.height) * 2 + 1);
});
cv.addEventListener('mouseleave', () => mouseNDC.set(-10, -10));

/* ---------- animation loop ---------- */
const clock = new THREE.Clock();
function clockNow(){ return clock.elapsedTime; }
let lastBeatIndex = -1;
let visible = true;
new IntersectionObserver(en => { visible = en[0].isIntersecting; }, {threshold: 0.05}).observe(section);

function animate(){
  requestAnimationFrame(animate);
  if(!visible) return;
  const dt = Math.min(clock.getDelta(), 0.05);
  const t = clock.elapsedTime;

  // passive auto-orbit: the outer group revolves around the stationary heart
  // flow diagram stays oriented; the user can still drag to explore
  controls.update();

  /* the title steps aside when you zoom in */
  const camDist = camera.position.distanceTo(controls.target);
  const wantOverlay = camDist > 36;
  if(wantOverlay !== overlayVisible){
    overlayVisible = wantOverlay;
    headEl.classList.toggle('mr-faded', !wantOverlay);
    hintEl.classList.toggle('mr-faded', !wantOverlay);
  }

  /* gentle heartbeat, the logo stays the hero */
  const phase = (t % PERIOD) / PERIOD;
  const beat = beatValue(phase);
  heartGroup.scale.setScalar(1 + beatAmp * beat);
  heartGroup.position.y = heartGroup.userData.baseY;
  heartGlow.position.y = heartGroup.position.y;
  heartGlow.material.opacity = 0.28 + 0.14 * beat;
  heartGlow.scale.setScalar(10.8 + 1.2 * beat);
  heartLight.position.set(0, heartGroup.position.y, 0);
  heartLight.intensity = 1.4 + 1.2 * beat;
  heartMaterials.forEach(m => { m.emissiveIntensity = 0.12 + 0.22 * beat; });

  const beatIndex = Math.floor(t / PERIOD);
  if(beatIndex !== lastBeatIndex){
    lastBeatIndex = beatIndex;
    connections.forEach(cn => { cn.t = -cn.delay; });
  }
  connections.forEach(cn => {
    cn.t += dt / 0.95;
    if(cn.t >= 0 && cn.t <= 1){
      const pt = cn.reverse ? 1 - cn.t : cn.t;
      cn.pulse.position.copy(cn.curve.getPoint(pt));
      cn.pulse.material.opacity = Math.sin(cn.t * Math.PI) * 0.8;
    } else {
      cn.pulse.material.opacity = 0;
    }
  });

  /* dome shimmer + counter-rotation */
  domeGroup.rotation.y -= dt * 0.045;
  domeShellMat.opacity = 0.045 + 0.025 * beat;
  domeWireMat.opacity = 0.07 + 0.06 * beat;

  /* the CRO satellite orbits the whole system */
  const ca = t * 0.21;
  croNode.position.set(CRO_R * Math.sin(ca), CRO_Y, CRO_R * Math.cos(ca));
  croOrb.rotation.y += dt * 0.8;
  croGlow.material.opacity = 0.45 + 0.2 * beat;

  if(!reducedMotion) coreGroup.rotation.y += dt * 0.1;

  raycaster.setFromCamera(mouseNDC, camera);
  const hits = raycaster.intersectObjects(cards, false);
  const hit = hits.length ? hits[0].object : null;
  if(hit !== hovered){ hovered = hit; cv.classList.toggle('hovering', !!hovered); }
  cards.forEach(cd => {
    const target = cd === hovered ? 1 : 0;
    cd.userData.hover += (target - cd.userData.hover) * 0.14;
    const k = 1 + cd.userData.hover * 0.09;
    cd.scale.set(cd.userData.baseScale.x * k, cd.userData.baseScale.y * k, 1);
    if(cd.userData.conn){
      cd.userData.conn.tube.material.opacity = cd.userData.conn.baseOpacity + cd.userData.hover * 0.34;
    }
  });

  stars.rotation.y = t * 0.008;

  renderer.render(scene, camera);
}

controls.update();
animate();
setTimeout(() => loaderEl.classList.add('done'), 900);

window.addEventListener('resize', () => {
  camera.aspect = section.clientWidth / section.clientHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(section.clientWidth, section.clientHeight);
});
